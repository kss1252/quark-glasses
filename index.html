<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夸克眼镜使用教程 - PDF图片查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .main-content {
            display: flex;
            gap: 20px;
            flex: 1;
        }
        
        .sidebar {
            width: 250px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 600px; /* 与右侧盒子高度同步 */
        }
        
        .content-area {
            flex: 1;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            height: 600px; /* 与左侧保持一致的高度 */
        }
        
        .thumbnail-list {
            display: flex;
            flex-direction: column;
            gap: 10px; /* 适当增加间距改善可读性 */
            overflow-y: auto; /* 添加垂直滚动条 */
            flex: 1;
            max-height: 500px; /* 增加最大高度以充分利用600px空间 */
        }
        
        .thumbnail {
            padding: 10px; /* 适当增加内边距改善视觉效果 */
            background: #f8f9fa;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            border: 2px solid transparent;
            min-height: 80px; /* 增加最小高度以充分利用空间 */
        }
        
        .thumbnail:hover {
            background: #e9ecef;
            transform: translateY(-1px);
        }
        
        .thumbnail.active {
            background: #667eea;
            color: white;
            border-color: #5a67d8;
        }
        
        .thumbnail img {
            max-width: 100%;
            height: 60px; /* 增加图片高度以充分利用空间 */
            object-fit: contain; /* 改为contain保持比例 */
            border-radius: 4px;
            margin-bottom: 5px; /* 适当增加底部边距 */
        }
        
        .thumbnail .page-number {
            font-weight: bold;
            font-size: 10px; /* 进一步缩小字体 */
        }
        
        .pdf-viewer {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .viewer-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .nav-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .page-info {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }
        
        .zoom-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .zoom-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .zoom-btn:hover {
            background: #5a6268;
        }
        
        .pdf-image-container {
            flex: 1;
            display: flex;
            align-items: flex-start; /* 改为顶部对齐 */
            justify-content: center;
            padding: 20px; /* 减少内边距 */
            overflow: auto;
        }
        
        .pdf-image {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        
        .pdf-image.zoomed {
            transform: scale(1.5);
        }
        
        .quick-nav {
            display: none; /* 隐藏快速导航区域 */
        }
        
        .page-btn {
            background: #e9ecef;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .page-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .page-btn.active {
            background: #667eea;
            color: white;
        }
        
        .footer {
            text-align: center;
            color: white;
            padding: 20px 0;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
            font-size: 18px;
        }
        
        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            margin: 20px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .main-content {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                order: 2;
            }
            
            .thumbnail-list {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: 10px;
            }
            
            .thumbnail {
                min-width: 120px;
            }
            
            .viewer-controls {
                flex-direction: column;
                gap: 15px;
            }
            
            .pdf-image-container {
                padding: 20px;
            }
        }
        
        /* 动画效果 */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 全屏模式 */
        .fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .fullscreen .pdf-image {
            max-width: 90vw;
            max-height: 90vh;
        }
        
        .fullscreen-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }
        
        .fullscreen-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>夸克眼镜使用教程</h1>
            <p>PDF图片浏览 - 完整的使用指南</p>
        </div>
        
        <div class="main-content">
            <div class="sidebar">
                <h3 style="margin-bottom: 15px; color: #667eea; text-align: center;">页面缩略图 (共53页)</h3>
                <div style="font-size: 12px; color: #666; text-align: center; margin-bottom: 10px;">显示7页，滚动查看更多</div>
                <div class="thumbnail-list" id="thumbnailList">
                    <!-- 缩略图将通过JavaScript生成 -->
                </div>
            </div>
            
            <div class="content-area">
                <div class="pdf-viewer">
                    <div class="viewer-controls">
                        <button class="nav-btn" onclick="prevPage()" id="prevBtn">
                            <span>⬅️</span> 上一页
                        </button>
                        
                        <div class="page-info">
                            第 <span id="currentPage">1</span> 页 / 共 <span id="totalPages">0</span> 页
                        </div>
                        
                        <div class="zoom-controls">
                            <button class="zoom-btn" onclick="zoomOut()">缩小</button>
                            <span id="zoomLevel">100%</span>
                            <button class="zoom-btn" onclick="zoomIn()">放大</button>
                            <button class="fullscreen-btn" onclick="toggleFullscreen()">全屏</button>
                        </div>
                        
                        <button class="nav-btn" onclick="nextPage()" id="nextBtn">
                            下一页 <span>➡️</span>
                        </button>
                    </div>
                    
                    <div class="pdf-image-container" id="pdfImageContainer">
                        <!-- 图片将通过JavaScript动态加载 -->
                    </div>
                    
                    <div class="quick-nav" id="quickNav">
                        <!-- 快速导航按钮将通过JavaScript生成 -->
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2025 夸克眼镜使用教程展示网站</p>
            <p>使用键盘 ← → 箭头键可以快速翻页 | 鼠标滚轮缩放 | 双击图片全屏</p>
        </div>
    </div>

    <script>
        // 当前状态
        let currentPage = 1;
        let totalPages = 53; // 实际图片数量
        let currentZoom = 1;
        let isFullscreen = false;

        // 页面加载完成后立即初始化
        window.onload = function() {
            initializeViewer();
        };

        function initializeViewer() {
            document.getElementById('totalPages').textContent = totalPages;
            
            // 立即显示第一页图片
            displayPage(1);
            
            // 生成缩略图列表
            generateThumbnails();
            
            // 不再生成快速导航（已隐藏）
            
            // 添加键盘快捷键
            setupKeyboardShortcuts();
            
            // 添加鼠标滚轮缩放
            setupMouseWheelZoom();
        }

        function generateThumbnails() {
            const thumbnailList = document.getElementById('thumbnailList');
            thumbnailList.innerHTML = '';
            
            for (let i = 1; i <= totalPages; i++) {
                const thumbnail = document.createElement('div');
                thumbnail.className = 'thumbnail';
                const imageName = `page_${String(i).padStart(3, '0')}.png`;
                
                thumbnail.innerHTML = `
                    <img src="${imageName}" alt="第${i}页" loading="lazy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAwIiBoZWlnaHQ9IjExMDAiIHZpZXdCb3g9IjAgMCA4MDAgMTEwMCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjgwMCIgaGVpZ2h0PSIxMTAwIiBmaWxsPSIjRjhGOUZBIi8+Cjx0ZXh0IHg9IjUwIiB5PSI1MDAiIGZpbGw9IiMzMzMiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIyNCI+5Zu+54mH5Y+v6IO9PC90ZXh0Pgo8L3N2Zz4K'">
                    <div class="page-number">第${i}页</div>
                    <div style="font-size: 12px; color: #666;">${imageName}</div>
                `;
                thumbnail.onclick = () => displayPage(i);
                thumbnailList.appendChild(thumbnail);
            }
        }

        // 快速导航功能已移除

        function displayPage(pageNumber) {
            if (pageNumber < 1 || pageNumber > totalPages) return;
            
            currentPage = pageNumber;
            document.getElementById('currentPage').textContent = currentPage;
            
            // 更新按钮状态
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
            
            // 更新缩略图状态
            updateThumbnails();
            
            // 不再更新快速导航状态（已隐藏）
            
            // 显示图片
            const container = document.getElementById('pdfImageContainer');
            const imageName = `page_${String(pageNumber).padStart(3, '0')}.png`;
            
            container.innerHTML = `
                <img src="${imageName}" 
                     alt="第${pageNumber}页" 
                     class="pdf-image fade-in" 
                     id="currentPdfImage"
                     ondblclick="toggleFullscreen()"
                     onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAwIiBoZWlnaHQ9IjExMDAiIHZpZXdCb3g9IjAgMCA4MDAgMTEwMCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjgwMCIgaGVpZ2h0PSIxMTAwIiBmaWxsPSIjRjhGOUZBIi8+Cjx0ZXh0IHg9IjUwIiB5PSI1MDAiIGZpbGw9IiMzMzMiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIyNCI+5Zu+54mH5Y+v6IO9PC90ZXh0Pgo8L3N2Zz4K'">
            `;
            
            // 应用当前缩放级别
            applyZoom();
            
            // 添加加载完成后的动画
            const img = document.getElementById('currentPdfImage');
            img.onload = function() {
                this.classList.add('fade-in');
            };
        }

        function updateThumbnails() {
            const thumbnails = document.querySelectorAll('.thumbnail');
            thumbnails.forEach((thumb, index) => {
                if (index + 1 === currentPage) {
                    thumb.classList.add('active');
                } else {
                    thumb.classList.remove('active');
                }
            });
        }

        // 快速导航状态更新功能已移除

        function prevPage() {
            if (currentPage > 1) {
                displayPage(currentPage - 1);
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                displayPage(currentPage + 1);
            }
        }

        function zoomIn() {
            if (currentZoom < 3) {
                currentZoom += 0.1;
                applyZoom();
            }
        }

        function zoomOut() {
            if (currentZoom > 0.5) {
                currentZoom -= 0.1;
                applyZoom();
            }
        }

        function applyZoom() {
            const img = document.getElementById('currentPdfImage');
            if (img) {
                img.style.transform = `scale(${currentZoom})`;
                document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
            }
        }

        function toggleFullscreen() {
            const img = document.getElementById('currentPdfImage');
            if (!img) return;
            
            if (!isFullscreen) {
                // 进入全屏
                const fullscreenDiv = document.createElement('div');
                fullscreenDiv.className = 'fullscreen';
                fullscreenDiv.innerHTML = `
                    <img src="${img.src}" alt="全屏模式" style="max-width: 90vw; max-height: 90vh;">
                `;
                fullscreenDiv.onclick = toggleFullscreen;
                document.body.appendChild(fullscreenDiv);
                isFullscreen = true;
            } else {
                // 退出全屏
                const fullscreenDiv = document.querySelector('.fullscreen');
                if (fullscreenDiv) {
                    fullscreenDiv.remove();
                }
                isFullscreen = false;
            }
        }

        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', function(event) {
                if (event.key === 'ArrowLeft') {
                    prevPage();
                } else if (event.key === 'ArrowRight') {
                    nextPage();
                } else if (event.key === 'Escape' && isFullscreen) {
                    toggleFullscreen();
                } else if (event.key === '+' || event.key === '=') {
                    zoomIn();
                } else if (event.key === '-') {
                    zoomOut();
                }
            });
        }

        function setupMouseWheelZoom() {
            const container = document.getElementById('pdfImageContainer');
            container.addEventListener('wheel', function(event) {
                if (event.ctrlKey) {
                    event.preventDefault();
                    if (event.deltaY < 0) {
                        zoomIn();
                    } else {
                        zoomOut();
                    }
                }
            });
        }
    </script>
</body>
</html>
